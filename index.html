<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Unit 5 英語互動站 - Anny老師</title>
    <style>
        :root {
            --primary: #4A90E2; --secondary: #F5A623; --success: #7ED321; --danger: #FF5E5E; --bg: #F0F4F8; --quiz-purple: #6C63FF; --dark: #333;
        }
        * { touch-action: manipulation; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        nav { width: 100%; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; justify-content: center; gap: 4px; padding: 12px 5px; position: sticky; top: 0; z-index: 100; }
        .nav-btn { flex: 1; max-width: 85px; padding: 10px 0; border-radius: 12px; border: 2px solid var(--primary); background: transparent; color: var(--primary); font-weight: bold; font-size: 0.8rem; cursor: pointer; text-align: center; }
        .nav-btn.active { background: var(--primary); color: white; }
        .container { width: 95%; max-width: 650px; margin-top: 15px; display: none; flex-direction: column; align-items: center; padding-bottom: 50px; }
        .container.active { display: flex; }

        /* ── Learn card ── */
        .flip-card { background-color: transparent; width: 100%; perspective: 1000px; margin-bottom: 15px; cursor: pointer; }
        .flip-card-inner { position: relative; width: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back { position: relative; width: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; border-radius: 25px; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; padding: 25px 20px 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.08); border: 1px solid #eee; background: white; }
        .flip-card-back { position: absolute; top: 0; left: 0; transform: rotateY(180deg); overflow-y: auto; max-height: 100%; }

        .word { font-size: 2.6rem; color: var(--primary); font-weight: bold; margin-bottom: 4px; }
        .pos { color: #888; font-style: italic; margin-bottom: 8px; font-size: 1rem; }
        .def-en { font-size: 1rem; color: #444; line-height: 1.5; font-style: italic; text-align: center; }
        .def-ch { font-size: 1.5rem; color: #222; font-weight: bold; margin-top: 8px; }
        .sense-block { width: 100%; background: #f8f9fa; border-radius: 12px; padding: 12px 14px; margin-top: 10px; text-align: left; border-left: 3px solid var(--primary); }
        .sense-block + .sense-block { border-left-color: var(--secondary); margin-top: 8px; }
        .sense-label { font-size: 0.8rem; font-weight: bold; color: var(--primary); text-transform: uppercase; margin-bottom: 4px; }
        .sense-block:nth-child(2) .sense-label { color: var(--secondary); }
        .sense-def-en { font-size: 0.9rem; color: #555; font-style: italic; }
        .sense-def-ch { font-size: 1.1rem; color: #222; font-weight: bold; margin-top: 3px; }
        .collocation-box { width: 100%; background: #eef6ff; border-radius: 10px; padding: 10px 14px; margin-top: 8px; font-size: 0.88rem; color: #334; border: 1px dashed #a0c4f1; }
        .collocation-box strong { color: var(--primary); }
        .example-box { width: 100%; background: #fffbf0; border-radius: 10px; padding: 10px 14px; margin-top: 6px; font-size: 0.88rem; color: #555; border: 1px solid #ffe5a0; }
        .extra-info { font-size: 1rem; color: var(--dark); background: #fdf2e9; padding: 12px; border-radius: 15px; width: 100%; margin-top: 12px; text-align: center; border: 1px solid var(--secondary); }
        .hint { color: var(--primary); font-size: 0.85rem; margin-top: 18px; font-weight: bold; }
        .word-counter { font-size: 0.85rem; color: #999; margin-bottom: 6px; }

        /* ── Match ── */
        #match-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; }
        .match-item { background: white; border: 2px solid #E5E7EB; border-radius: 12px; min-height: 80px; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; font-weight: bold; cursor: pointer; text-align: center; padding: 8px; transition: 0.2s; user-select: none; }
        .match-item.selected { border-color: var(--primary); background: #EBF4FF; }
        .match-item.correct { visibility: hidden !important; opacity: 0 !important; pointer-events: none !important; }
        .match-item.wrong { background: var(--danger) !important; color: white !important; border-color: var(--danger) !important; }

        .btn-main { width: 100%; min-height: 55px; border-radius: 15px; font-size: 1.1rem; font-weight: bold; margin-bottom: 10px; cursor: pointer; border: none; }
        .feedback { min-height: 40px; margin-top: 8px; font-weight: bold; font-size: 1.2rem; text-align: center; }

        /* ── Quiz ── */
        .quiz-audio-btn { width: 90px; height: 90px; background: var(--quiz-purple); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin: 10px auto 16px; border: none; cursor: pointer; }
        .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .option-btn { background: white; border: 2px solid #E5E7EB; border-radius: 15px; padding: 14px 10px; font-size: 0.95rem; cursor: pointer; min-height: 70px; color: #333; font-weight: 500; }

        /* ── Report ── */
        .report-item { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #EEE; }
        .report-label { font-weight: bold; color: #555; font-size: 1rem; }
        .report-val { color: var(--primary); font-weight: 800; font-size: 1.1rem; }

        /* ── Progress bar ── */
        .progress-wrap { width: 100%; background: #e0e7ef; border-radius: 10px; height: 8px; margin-bottom: 10px; }
        .progress-bar { height: 8px; border-radius: 10px; background: var(--primary); transition: width 0.4s; }
    </style>
</head>
<body>

<nav>
    <button class="nav-btn active" onclick="showPage('learn')">Learn</button>
    <button class="nav-btn" onclick="showPage('game')">Game</button>
    <button class="nav-btn" onclick="showPage('quiz')">Quiz</button>
    <button class="nav-btn" onclick="showPage('match')">Match</button>
    <button class="nav-btn" onclick="showPage('report')">Report</button>
</nav>

<!-- LEARN -->
<div id="learn" class="container active">
    <div class="word-counter" id="learn-counter">1 / 30</div>
    <div class="progress-wrap"><div class="progress-bar" id="learn-progress" style="width:3.3%"></div></div>
    <div class="flip-card" id="learn-flip" onclick="this.classList.toggle('flipped')">
        <div class="flip-card-inner" id="learn-card-inner"></div>
    </div>
    <button class="btn-main" style="background:var(--secondary);color:white;" onclick="handleSpeak();event.stopPropagation();">🔊 Listen（聽音）</button>
    <button class="btn-main" style="background:var(--primary);color:white;" onclick="handlePractice();event.stopPropagation();">🎤 Practice（開口練）</button>
    <div id="learn-feedback" class="feedback"></div>
    <button class="btn-main" style="background:var(--dark);color:white;" onclick="nextLearnWord();event.stopPropagation();">Next 單字 →</button>
</div>

<!-- GAME -->
<div id="game" class="container">
    <div style="background:white;border-radius:20px;padding:20px;width:100%;text-align:center;box-shadow:0 8px 15px rgba(0,0,0,0.05);">
        <div style="display:flex;justify-content:space-between;font-weight:bold;margin-bottom:20px;width:100%;">
            <span>Score: <span id="game-score-display">0</span></span>
            <span style="color:var(--danger);">Time: <span id="game-time-display">60</span>s</span>
        </div>
        <div id="game-word-display" class="word" style="margin:40px 0;">READY?</div>
        <div id="game-feedback" class="feedback"></div>
    </div>
    <button id="game-start-btn" class="btn-main" style="background:var(--success);color:white;margin-top:20px;" onclick="startGame()">START CHALLENGE</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="container">
    <div style="background:white;border-radius:20px;padding:20px;width:100%;text-align:center;box-shadow:0 8px 15px rgba(0,0,0,0.05);" id="quiz-main-card">
        <div style="display:flex;justify-content:space-between;margin-bottom:15px;font-weight:bold;color:#666;width:100%;">
            <span>題號: <span id="quiz-num">1</span> / 10</span>
            <span>得分: <span id="quiz-score-display">0</span></span>
        </div>
        <button class="quiz-audio-btn" onclick="playQuizAudio()">🔊</button>
        <div id="quiz-options" class="quiz-options"></div>
    </div>
    <div id="quiz-feedback" class="feedback"></div>
    <button id="quiz-retry-btn" class="btn-main" style="background:var(--primary);color:white;display:none;" onclick="startQuizSession()">Restart Quiz</button>
</div>

<!-- MATCH -->
<div id="match" class="container">
    <div style="background:white;border-radius:20px;padding:20px;width:100%;text-align:center;box-shadow:0 8px 15px rgba(0,0,0,0.05);">
        <div style="display:flex;justify-content:space-between;font-weight:bold;margin-bottom:10px;">
            <span>Match Game</span>
            <span style="color:var(--primary);">Time: <span id="match-timer">0</span>s</span>
        </div>
        <p style="font-size:0.9rem;color:var(--dark);margin:0 0 4px;font-weight:800;">Match the word with its synonym.</p>
        <p style="font-size:0.8rem;color:#666;margin:0 0 12px;">請選出本課單字的同義字</p>
        <div id="match-grid"></div>
    </div>
    <button id="match-start-btn" class="btn-main" style="background:var(--success);color:white;margin-top:20px;" onclick="startMatchGame()">開始挑戰</button>
    <div id="match-feedback" class="feedback"></div>
</div>

<!-- REPORT -->
<div id="report" class="container">
    <div style="background:white;border-radius:20px;padding:25px;width:100%;box-shadow:0 8px 15px rgba(0,0,0,0.05);">
        <h2 style="margin-top:0;">Progress Report</h2>
        <div class="report-item"><span class="report-label">Game 最高分</span><span class="report-val"><span id="best-game">0</span> 分</span></div>
        <div class="report-item"><span class="report-label">Quiz 最高得分</span><span class="report-val"><span id="best-quiz">0</span> / 100</span></div>
        <div class="report-item"><span class="report-label">Match 最快紀錄</span><span class="report-val"><span id="best-match">--</span> 秒</span></div>
        <div class="report-item"><span class="report-label">Learn 已瀏覽</span><span class="report-val"><span id="best-learn">0</span> 個單字</span></div>
    </div>
</div>

<script>
// ═══════════════════════════════════════════

        collocations: "have / need / provide proof",
        example: "Will thinks that Mrs. Jones is the killer, but he doesn't have any proof to confirm his suspicion.",

// ═══════════════════════════════════════════
// GLOBALS
// ═══════════════════════════════════════════
let bestScores = { game: 0, quiz: 0, match: null, learnSeen: 0 };
let quizUsed = [], quizSession = {};
let learnIdx = 0;
let gameActive = false, gameScore = 0;
const TOTAL = vocabulary.length;

const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition || null;
let mainRec = null;
if (SpeechRec) { try { mainRec = new SpeechRec(); mainRec.lang = 'en-US'; mainRec.continuous = false; mainRec.interimResults = false; } catch(e){} }

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
function showPage(id) {
    document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(b => {
        if (b.innerText.toLowerCase() === id) b.classList.add('active');
    });
    window.speechSynthesis.cancel();
    gameActive = false;
    clearInterval(window._matchInt);
    if (mainRec) { try { mainRec.abort(); } catch(e){} }
    if (id === 'report') updateReport();
    if (id === 'learn')  updateLearn();
    if (id === 'quiz')   startQuizSession();
}

// ═══════════════════════════════════════════
// SPEECH
// ═══════════════════════════════════════════
function globalSpeak(text, rate) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US';
    u.rate = rate || 0.85;
    window.speechSynthesis.speak(u);
}

// ═══════════════════════════════════════════
// LEARN
// ═══════════════════════════════════════════
function updateLearn() {
    const d = vocabulary[learnIdx];
    const card = document.getElementById('learn-flip');
    if (card) card.classList.remove('flipped');

    // counter & progress
    document.getElementById('learn-counter').innerText = `${learnIdx + 1} / ${TOTAL}`;
    document.getElementById('learn-progress').style.width = `${((learnIdx + 1) / TOTAL) * 100}%`;
    if (learnIdx + 1 > bestScores.learnSeen) bestScores.learnSeen = learnIdx + 1;

    // FRONT: word + pos + first English definition
    const frontHtml = `
        <div class="word">${d.word}</div>
        <div class="pos">${d.pos}</div>
        <div class="def-en">${d.senses[0].def_en}</div>
        <p class="hint">（Click to reveal Chinese 點擊看中文）</p>`;

    // BACK: all senses + collocations + example + syn/ant
    let sensesHtml = d.senses.map((s, i) => `
        <div class="sense-block">
            ${d.senses.length > 1 ? `<div class="sense-label">Sense ${i + 1}</div>` : ''}
            <div class="sense-def-en">${s.def_en}</div>
            <div class="sense-def-ch">${s.def_ch}</div>
        </div>`).join('');

    let colHtml = d.collocations ? `<div class="collocation-box"><strong>📌 Collocation：</strong>${d.collocations}</div>` : '';
    let exHtml  = d.example      ? `<div class="example-box">📖 ${d.example}</div>` : '';

    const backHtml = `
        <div class="word" style="font-size:2rem;">${d.word}</div>
        ${sensesHtml}
        ${colHtml}
        ${exHtml}
        <div class="extra-info" style="margin-top:12px;">
            <strong>同義字：</strong>${d.syn}<br><br>
            <strong>反義字：</strong>${d.ant}
        </div>`;

    document.getElementById('learn-card-inner').innerHTML = `
        <div class="flip-card-front">${frontHtml}</div>
        <div class="flip-card-back">${backHtml}</div>`;

    // auto-size card height
    setTimeout(() => {
        const front = document.querySelector('.flip-card-front');
        const back  = document.querySelector('.flip-card-back');
        const h = Math.max(front ? front.scrollHeight : 0, back ? back.scrollHeight : 0, 320);
        document.getElementById('learn-card-inner').style.height = h + 'px';
    }, 50);

    document.getElementById('learn-feedback').innerText = '';
}

function nextLearnWord() {
    learnIdx = (learnIdx + 1) % TOTAL;
    updateLearn();
}

function handleSpeak() {
    globalSpeak(vocabulary[learnIdx].word);
}

function handlePractice() {
    if (!mainRec) {
        document.getElementById('learn-feedback').innerText = '⚠️ 此裝置不支援語音辨識';
        return;
    }
    const fb = document.getElementById('learn-feedback');
    fb.style.color = '#888'; fb.innerText = 'Listening… 🎤';
    mainRec.onresult = (e) => {
        const heard = e.results[0][0].transcript.toLowerCase().trim();
        const target = vocabulary[learnIdx].word.toLowerCase();
        if (heard.includes(target)) {
            fb.style.color = 'var(--success)'; fb.innerText = '✅ Correct! Great job!';
        } else {
            fb.style.color = 'var(--danger)'; fb.innerText = `❌ Heard: "${heard}" — Try again!`;
        }
    };
    mainRec.onerror = () => { fb.style.color = 'var(--danger)'; fb.innerText = '⚠️ Could not hear you. Try again.'; };
    try { mainRec.start(); } catch(e){}
}

// ═══════════════════════════════════════════
// GAME  (speech challenge)
// ═══════════════════════════════════════════
function startGame() {
    if (!mainRec) {
        document.getElementById('game-feedback').innerText = '⚠️ 此裝置不支援語音辨識';
        return;
    }
    gameActive = true; gameScore = 0; let time = 60;
    document.getElementById('game-score-display').innerText = '0';
    document.getElementById('game-start-btn').style.display = 'none';
    document.getElementById('game-feedback').innerText = '';

    const timer = setInterval(() => {
        time--;
        document.getElementById('game-time-display').innerText = time;
        if (time <= 0 || !gameActive) {
            clearInterval(timer);
            gameActive = false;
            try { mainRec.abort(); } catch(e){}
            if (gameScore > bestScores.game) bestScores.game = gameScore;
            document.getElementById('game-word-display').innerText = '🎉 Time Up!';
            document.getElementById('game-feedback').innerText = `Final score: ${gameScore}`;
            document.getElementById('game-start-btn').style.display = 'block';
        }
    }, 1000);
    loadNextGameWord();
}

function loadNextGameWord() {
    if (!gameActive) return;
    const target = vocabulary[Math.floor(Math.random() * TOTAL)].word;
    document.getElementById('game-word-display').innerText = target;
    mainRec.onresult = (e) => {
        if (e.results[0][0].transcript.toLowerCase().includes(target.toLowerCase())) {
            gameScore += 10;
            document.getElementById('game-score-display').innerText = gameScore;
            document.getElementById('game-feedback').innerText = '✅ +10';
            setTimeout(() => { if (gameActive) document.getElementById('game-feedback').innerText = ''; }, 500);
            loadNextGameWord();
        }
    };
    mainRec.onend = () => { if (gameActive) try { mainRec.start(); } catch(e){} };
    try { mainRec.start(); } catch(e){}
}

// ═══════════════════════════════════════════
// QUIZ  (listen → pick Chinese)
// ═══════════════════════════════════════════
function startQuizSession() {
    quizUsed = [];
    quizSession = { num: 1, score: 0 };
    document.getElementById('quiz-retry-btn').style.display = 'none';
    document.getElementById('quiz-main-card').style.display = 'block';
    document.getElementById('quiz-feedback').innerText = '';
    loadQuiz();
}

function loadQuiz() {
    const fb = document.getElementById('quiz-feedback');
    if (quizSession.num > 10) {
        if (quizSession.score > bestScores.quiz) bestScores.quiz = quizSession.score;
        fb.innerText = `🎉 測驗完成！得分 ${quizSession.score} / 100`;
        document.getElementById('quiz-main-card').style.display = 'none';
        document.getElementById('quiz-retry-btn').style.display = 'block';
        return;
    }
    fb.innerText = '';
    document.getElementById('quiz-num').innerText = quizSession.num;
    document.getElementById('quiz-score-display').innerText = quizSession.score;

    const pool   = vocabulary.filter(v => !quizUsed.includes(v.word));
    const target = pool[Math.floor(Math.random() * pool.length)];
    quizSession.curTarget = target;
    quizUsed.push(target.word);

    // correct answer is always sense[0] Chinese
    const correct = target.senses[0].def_ch;
    const opts = [correct];
    while (opts.length < 4) {
        const r = vocabulary[Math.floor(Math.random() * TOTAL)].senses[0].def_ch;
        if (!opts.includes(r)) opts.push(r);
    }
    opts.sort(() => 0.5 - Math.random());

    const container = document.getElementById('quiz-options');
    container.innerHTML = '';
    opts.forEach(opt => {
        const b = document.createElement('button');
        b.className = 'option-btn';
        b.innerText = opt;
        b.onclick = () => {
            if (opt === correct) {
                b.style.background = '#e6ffed'; b.style.borderColor = 'var(--success)';
                quizSession.score += 10;
                document.getElementById('quiz-score-display').innerText = quizSession.score;
                fb.style.color = 'var(--success)'; fb.innerText = '✅ 答對了！';
            } else {
                b.style.background = '#FFEBEE'; b.style.borderColor = 'var(--danger)';
                fb.style.color = 'var(--danger)'; fb.innerText = `❌ 答錯了！正確答案：${correct}`;
            }
            // disable all buttons briefly
            container.querySelectorAll('.option-btn').forEach(x => x.disabled = true);
            quizSession.num++;
            setTimeout(loadQuiz, 1200);
        };
        container.appendChild(b);
    });
    globalSpeak(target.word);
}

function playQuizAudio() {
    if (quizSession.curTarget) globalSpeak(quizSession.curTarget.word);
}

// ═══════════════════════════════════════════
// MATCH  (word ↔ synonym)
// ═══════════════════════════════════════════
let matchUsed = [];

function startMatchGame() {
    document.getElementById('match-start-btn').style.display = 'none';
    document.getElementById('match-feedback').innerText = '';
    let mTime = 0, matchesFound = 0, firstCard = null;
    clearInterval(window._matchInt);
    document.getElementById('match-timer').innerText = '0';
    window._matchInt = setInterval(() => {
        mTime++;
        document.getElementById('match-timer').innerText = mTime;
    }, 1000);

    // pick 6 unique words that have distinct first synonyms
    let pool = vocabulary.filter(v => !matchUsed.includes(v.word));
    if (pool.length < 6) { matchUsed = []; pool = [...vocabulary]; }
    const sub = pool.sort(() => 0.5 - Math.random()).slice(0, 6);
    sub.forEach(s => matchUsed.push(s.word));

    // build 12 cards: word + first synonym
    let cards = [];
    sub.forEach(v => {
        const synWord = v.syn.split(',')[0].trim();
        cards.push({ id: v.word, text: v.word,    type: 'word' });
        cards.push({ id: v.word, text: synWord,   type: 'syn'  });
    });
    cards.sort(() => 0.5 - Math.random());

    const grid = document.getElementById('match-grid');
    grid.innerHTML = '';
    cards.forEach(item => {
        const div = document.createElement('div');
        div.className = 'match-item';
        div.innerText = item.text;
        if (item.type === 'syn') div.style.color = '#777';
        div.onclick = () => {
            if (div.classList.contains('correct') || div === firstCard?.div) return;
            div.classList.add('selected');
            if (!firstCard) {
                firstCard = { div, item };
            } else {
                if (firstCard.item.id === item.id && firstCard.item.type !== item.type) {
                    // correct pair
                    div.classList.add('correct');
                    firstCard.div.classList.add('correct');
                    matchesFound++;
                    if (matchesFound === 6) {
                        clearInterval(window._matchInt);
                        if (!bestScores.match || mTime < bestScores.match) bestScores.match = mTime;
                        document.getElementById('match-feedback').innerText = `🎉 完成！用時 ${mTime} 秒`;
                        setTimeout(() => { document.getElementById('match-start-btn').style.display = 'block'; }, 600);
                    }
                    firstCard = null;
                } else {
                    // wrong pair
                    div.classList.add('wrong');
                    firstCard.div.classList.add('wrong');
                    const fd = firstCard.div, fd2 = div;
                    setTimeout(() => {
                        fd.classList.remove('selected', 'wrong');
                        fd2.classList.remove('selected', 'wrong');
                        firstCard = null;
                    }, 700);
                }
            }
        };
        grid.appendChild(div);
    });
}

// ═══════════════════════════════════════════
// REPORT
// ═══════════════════════════════════════════
function updateReport() {
    document.getElementById('best-game').innerText  = bestScores.game;
    document.getElementById('best-quiz').innerText  = bestScores.quiz;
    document.getElementById('best-match').innerText = bestScores.match || '--';
    document.getElementById('best-learn').innerText = bestScores.learnSeen;
}

// init
updateLearn();
</script>
